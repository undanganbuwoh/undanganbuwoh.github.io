<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Undangan Pernikahan Sulton & Mila</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

</head>

<body>

<!-- Amplop -->

<div class="envelope" id="envelope">

<h2>Undangan Pernikahan</h2>

<h1>Sulton & Mila</h1>

<p id="guest"></p>

<button onclick="openInvite()">Buka Undangan</button>

</div>

<!-- Konten -->

<div id="content">

<section class="hero">

<h1>Sulton & Mila</h1>

<p>24 Mei 2026</p>

<div id="countdown"></div>

</section>

<section class="gallery">

<h2>Galeri</h2>

<div class="slider">

<img src="https://picsum.photos/500/400?1">
<img src="https://picsum.photos/500/400?2">
<img src="https://picsum.photos/500/400?3">

</div>

</section>

<section class="guestbook">

<h2>Buku Tamu</h2>

<input id="nama" placeholder="Nama">

<textarea id="pesan" placeholder="Ucapan"></textarea>

<button onclick="kirim()">Kirim</button>

<div id="list"></div>

</section>

</div>

<!-- Musik -->

<iframe width="0" height="0"
src="https://www.youtube.com/embed/7U8Rk2n2F9M?autoplay=1&loop=1&playlist=7U8Rk2n2F9M"
allow="autoplay"></iframe>

<script src="script.js"></script>

</html>
